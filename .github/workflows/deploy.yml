name: Deploy to Production

on:
  # Manual-only until VPS secrets (VPS_HOST, VPS_USER, VPS_PASSWORD) are configured
  # in repo Settings → Secrets and variables → Actions. Then re-add `push: branches: [main]`.
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Build sel2pw.exe (and Linux/macOS variants)
        run: npm run build:exe
        # build-exe.js exits 0 if @yao-pkg/pkg isn't installed locally; the
        # production VPS step below also rebuilds the exe with pkg available.

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/testforge-ai/Converter
            bash scripts/deploy-app.sh
