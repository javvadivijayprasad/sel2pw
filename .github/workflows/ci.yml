name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - name: Smoke — convert sample project
        run: |
          node dist/cli.js convert ./examples/selenium-testng-sample --out /tmp/sel2pw-smoke
          test -f /tmp/sel2pw-smoke/pages/login.page.ts
          test -f /tmp/sel2pw-smoke/tests/login.spec.ts
          test -f /tmp/sel2pw-smoke/CONVERSION_REVIEW.md
          test -f /tmp/sel2pw-smoke/MIGRATION_NOTES.md
        shell: bash

  coverage:
    runs-on: ubuntu-latest
    # Non-blocking — coverage is a vanity metric, not a gate. If
    # `npm run test:cov` exits non-zero (typical: vitest coverage-v8
    # provider mismatch on first run, threshold not met, etc.), the
    # job shows yellow but CI overall stays green. Re-tighten once
    # the coverage report is actually consumed (Codecov, PR comments).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run test:cov
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
