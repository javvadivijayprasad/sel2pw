name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - name: Smoke — convert sample project
        run: |
          node dist/cli.js convert ./examples/selenium-testng-sample --out /tmp/sel2pw-smoke
          test -f /tmp/sel2pw-smoke/pages/login.page.ts
          test -f /tmp/sel2pw-smoke/tests/login.spec.ts
          test -f /tmp/sel2pw-smoke/CONVERSION_REVIEW.md
          test -f /tmp/sel2pw-smoke/MIGRATION_NOTES.md
        shell: bash

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run test:cov
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
