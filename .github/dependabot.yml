version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      types:
        patterns: ["@types/*"]
      eslint:
        patterns: ["eslint*", "@typescript-eslint/*"]
      vitest:
        patterns: ["vitest", "@vitest/*"]
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
